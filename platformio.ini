[env]
platform = espressif32@6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_build.arduino.memory_type = dio_opi
board_upload.flash_size = 16MB
board_build.partitions = default_16MB.csv

lib_deps =
  lvgl/lvgl @ ^8.3.11
  bodmer/TFT_eSPI @ ^2.5.43
  esp32-camera
  esphome/ESPAsyncWebServer-esphome @ ^3.3.0
  bitbank2/JPEGDEC @ ^1.2.7

build_flags =
  ; --- PSRAM ---
  -DBOARD_HAS_PSRAM

  ; --- USB ---
  -DARDUINO_USB_CDC_ON_BOOT=0

  ; --- TFT_eSPI ---
  -DUSER_SETUP_LOADED=1
  -DILI9341_DRIVER=1
  -DTFT_WIDTH=240
  -DTFT_HEIGHT=320
  -DTFT_MOSI=14
  -DTFT_SCLK=21
  -DTFT_MISO=1
  -DTFT_CS=41
  -DTFT_DC=42
  -DTFT_RST=47
  -DTOUCH_CS=2
  -DSPI_FREQUENCY=40000000
  -DSPI_READ_FREQUENCY=20000000
  -DSPI_TOUCH_FREQUENCY=2500000

  ; --- LVGL ---
  -DLV_CONF_INCLUDE_SIMPLE
  -DLV_LVGL_H_INCLUDE_SIMPLE
  -I src
  -I src/ui
  -I src/ui/screens

  ; --- Flash large const arrays (images + fonts) into flash instead of RAM ---
  ; Force-includes lv_flash_attr.h before every TU so LV_ATTRIBUTE_LARGE_CONST
  ; is defined as __attribute__((section(".rodata"))) before lvgl.h sees it.
  -include include/lv_flash_attr.h

[platformio]
default_envs = esp32-s3-devkitc-1

[env:esp32-s3-devkitc-1]

[env:touch-calibrator]
build_flags =
  ${env.build_flags}
  -DTOUCH_CALIBRATE_ON_BOOT
